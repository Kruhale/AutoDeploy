# =====================================================
# AutoDeploy — server block para el nginx del HOST del VPS
# =====================================================
# Pegar este archivo en /etc/nginx/sites-available/autodeploy
# Luego habilitar con:
#   sudo ln -s /etc/nginx/sites-available/autodeploy /etc/nginx/sites-enabled/
#   sudo nginx -t                       # verificar sintaxis
#   sudo systemctl reload nginx
#
# Después emitir certificado con certbot:
#   sudo certbot --nginx -d TU-DOMINIO.com
#
# (Reemplazar TU-DOMINIO.com con el dominio real)
# =====================================================

# Bloque HTTP (puerto 80) — certbot lo modificará para añadir el redirect a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name TU-DOMINIO.com;

    # ACME challenge para Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Resto: redirigir a HTTPS (certbot añadirá el 301 si se elige opción 2)
    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloque HTTPS — certbot rellenará ssl_certificate y ssl_certificate_key
server {
    listen 443 ssl;
    http2 on;
    server_name TU-DOMINIO.com;

    # === Certificados — los rellena certbot ===
    # ssl_certificate     /etc/letsencrypt/live/TU-DOMINIO.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/TU-DOMINIO.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # === Hardening básico ===
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === Limites ===
    # AutoDeploy sube ZIPs de hasta 60 MB para deploy
    client_max_body_size 60M;

    # === Logs separados por dominio (recomendado) ===
    access_log /var/log/nginx/autodeploy.access.log;
    error_log  /var/log/nginx/autodeploy.error.log warn;

    # === Reverse proxy al contenedor de AutoDeploy ===
    # El compose publica el frontend en localhost:8082 (HTTP plano).
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts: deploys SSH y operaciones pesadas tardan
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # WebSocket (terminal SSH, métricas, notificaciones)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Variable para upgrade dinámico de WebSocket
# (si no está ya en nginx.conf global, añadir este bloque map en /etc/nginx/conf.d/upgrade.conf)
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
