# nginx del contenedor — escucha en HTTP (puerto 80 dentro del contenedor)
# El TLS lo termina el nginx del HOST del VPS (Let's Encrypt centralizado).
# Si se levantara sin nginx-host delante, se accede por http://localhost:8082/.
server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Subida de ZIP para despliegues (límite 60 MB, coincide con Spring multipart)
    client_max_body_size 60M;

    # Timeouts largos: deploys SSH y operaciones contra VPS remotos pueden tardar
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # Logs explícitos a archivos persistentes (volumen nginx-logs)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Compresión de respuestas estáticas
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API REST → backend Spring Boot
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # WebSocket (terminal SSH, métricas, notificaciones)
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # WebSocket no debe cortarse cada 60s
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Swagger UI y OpenAPI servidos por el backend
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /swagger-ui.html {
        proxy_pass http://backend:8080/swagger-ui.html;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Actuator del backend (health, info, metrics, prometheus)
    location /actuator/ {
        proxy_pass http://backend:8080/actuator/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA Angular — todo lo demás cae al index.html (history fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
