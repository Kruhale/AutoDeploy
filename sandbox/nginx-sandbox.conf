# Nginx sidecar del sandbox-ssh.
#
# Sirve los archivos estaticos que el usuario despliega via ZIP desde la UI
# de AutoDeploy. Los archivos viven en el volumen `sandbox-web-content`,
# compartido entre este contenedor (lectura) y sandbox-ssh (escritura).
#
# Convencion: cada aplicacion vive en su propio subdirectorio /web/<app>/
# dentro del sandbox-ssh. Aqui se monta como /usr/share/nginx/html/<app>/
# y se sirve en http://<host>:8084/<app>/.
#
# El nginx-host del VPS hace TLS termination con Let's Encrypt y proxy_pass
# desde el subdominio publico a este puerto.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    charset utf-8;

    # Cabeceras de seguridad basicas.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs. Si el contenedor no tiene volumen para esto, salen a stdout.
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Cualquier ruta intenta servir archivo, despues directorio con index, 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Assets estaticos: cache largo.
    location ~* \.(?:css|js|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    # HTML sin cache: que cada navegacion compruebe si hay version nueva.
    location ~* \.html?$ {
        add_header Cache-Control "no-store";
    }
}
