# Drop-in para el sandbox-ssh (linuxserver/openssh-server).
#
# Se monta como volumen en /etc/ssh/sshd_config.d/99-password.conf:ro y obliga
# a OpenSSH a aceptar autenticacion por contrasena, sin depender de que la
# imagen regenere sshd_config en cada arranque.
#
# El sshd_config principal de la imagen termina con `Include /etc/ssh/sshd_config.d/*.conf`
# por lo que estas directivas SOBREESCRIBEN las del archivo principal.
#
# Sin este drop-in: la primera vez que el contenedor arranca con
# PASSWORD_ACCESS=true funciona, pero si despues alguien hace
# `docker compose up -d --force-recreate sandbox-ssh` la imagen no regenera
# el sshd_config (solo lo hace en la inicializacion absolutamente primera)
# y el contenedor vuelve a rechazar contrasenas.
#
# La clave SSH sigue funcionando igual: las dos vias coexisten.

PasswordAuthentication yes
PermitRootLogin no
PubkeyAuthentication yes
