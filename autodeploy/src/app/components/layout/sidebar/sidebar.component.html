<aside class="barra-lateral" [class.barra-lateral--abierta]="abierta()">
  <a class="barra-lateral__logo" routerLink="/">
    <img class="barra-lateral__logo__imagen" src="logo.png" alt="">
    <span class="barra-lateral__logo__texto">Auto<span class="barra-lateral__logo__texto--acento">Deploy</span></span>
  </a>

  <nav class="barra-lateral__navegacion">
    <section class="barra-lateral__seccion">
      <span class="barra-lateral__seccion__titulo">Main Menu</span>
      <ul class="barra-lateral__lista">
        <li>
          <a class="barra-lateral__enlace" routerLink="/app/dashboard" routerLinkActive="barra-lateral__enlace--activo"
            [routerLinkActiveOptions]="{ exact: true }">
            <i class="fa-solid fa-table-columns barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Dashboard</span>
          </a>
        </li>
        <li>
          <a class="barra-lateral__enlace" routerLink="/app/servidor/vps-alpha-01"
            routerLinkActive="barra-lateral__enlace--activo">
            <i class="fa-solid fa-server barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Servers</span>
          </a>
        </li>
        <li>
          <a class="barra-lateral__enlace" routerLink="/app/logs" routerLinkActive="barra-lateral__enlace--activo">
            <i class="fa-solid fa-chart-line barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Activity</span>
          </a>
        </li>
        <li>
          <button class="barra-lateral__enlace">
            <i class="fa-solid fa-credit-card barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Billing</span>
          </button>
        </li>
      </ul>
    </section>

    <section class="barra-lateral__seccion">
      <span class="barra-lateral__seccion__titulo">Server Actions</span>
      <ul class="barra-lateral__lista">
        <li>
          <a class="barra-lateral__enlace" routerLink="/app/nuevo-despliegue"
            routerLinkActive="barra-lateral__enlace--activo">
            <i class="fa-solid fa-grid-2 barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Applications</span>
          </a>
        </li>
        <li>
          <button class="barra-lateral__enlace">
            <i class="fa-solid fa-globe barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Networking & SSL</span>
          </button>
        </li>
        <li>
          <button class="barra-lateral__enlace">
            <i class="fa-solid fa-shield-halved barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Firewall</span>
          </button>
        </li>
        <li>
          <button class="barra-lateral__enlace">
            <i class="fa-solid fa-hard-drive barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Backups</span>
          </button>
        </li>
        <li>
          <button class="barra-lateral__enlace">
            <i class="fa-solid fa-gear barra-lateral__enlace__icono"></i>
            <span class="barra-lateral__enlace__texto">Settings</span>
          </button>
        </li>
      </ul>
    </section>
  </nav>

  <footer class="barra-lateral__inferior">
    <button class="barra-lateral__colapsar">
      <i class="fa-solid fa-angles-left barra-lateral__colapsar__icono"></i>
      <span class="barra-lateral__colapsar__texto">Collapse Menu</span>
    </button>
    <section class="barra-lateral__usuario">
      <span class="barra-lateral__usuario__avatar"></span>
      <section class="barra-lateral__usuario__info">
        <span class="barra-lateral__usuario__nombre">My Account</span>
        <span class="barra-lateral__usuario__plan">—</span>
      </section>
    </section>
  </footer>
</aside>
