<main class="pagina-login">
  <section class="pagina-login__tarjeta">

    <header class="pagina-login__cabecera">
      <span class="pagina-login__logo">AutoDeployService</span>
      <h1 class="pagina-login__titulo">Iniciar sesión</h1>
      <p class="pagina-login__subtitulo">Accede a tu panel de control</p>
    </header>

    <form class="pagina-login__formulario">

      @if (mensajeDeErrorVisible()) {
        <p class="pagina-login__error">Email o contraseña incorrectos</p>
      }

      <section class="campo">
        <label class="campo__etiqueta" for="email">Email</label>
        <input class="campo__input" id="email" type="email" placeholder="tu@email.com" autocomplete="email">
      </section>

      <section class="campo">
        <label class="campo__etiqueta" for="password">Contraseña</label>
        <section class="pagina-login__campo-password">
          <input class="campo__input" id="password" [type]="passwordEsVisible() ? 'text' : 'password'" placeholder="••••••••" autocomplete="current-password">
          <button class="pagina-login__boton-ver" type="button" (click)="alternarVisibilidadPassword()">
            {{ passwordEsVisible() ? 'Ocultar' : 'Ver' }}
          </button>
        </section>
      </section>

      <button class="boton--primario pagina-login__boton-enviar" type="button" (click)="iniciarSesion()">Iniciar sesión</button>

    </form>

    <footer class="pagina-login__pie">
      <span>¿No tienes cuenta?</span>
      <a class="pagina-login__enlace" routerLink="/register">Regístrate</a>
    </footer>

  </section>
</main>
