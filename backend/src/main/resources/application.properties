spring.application.name=autodeploy

# Excluir UserDetailsService autogenerado por Spring Security
# (no lo usamos: tenemos JwtAuthenticationFilter custom)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===== Servidor HTTP =====
server.port=8080
server.shutdown=graceful
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ===== MongoDB =====
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/autodeploy}
spring.data.mongodb.auto-index-creation=true

# ===== Seguridad =====
# Sin fallback hardcoded: si las env vars no estan definidas, el backend
# fallara al arrancar (fail-fast) en lugar de funcionar con secretos
# conocidos en GitHub. Genera valores reales con:
#   AUTODEPLOY_JWT_SECRET=$(openssl rand -base64 48)
#   AUTODEPLOY_CIFRADO_CLAVE=$(openssl rand -base64 32)
autodeploy.cifrado.clave=${AUTODEPLOY_CIFRADO_CLAVE:}
autodeploy.jwt.secret=${AUTODEPLOY_JWT_SECRET:}
autodeploy.jwt.expiration=86400000

# ===== Subida de archivos (deploy ZIP) =====
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=60MB

# ===== OpenRouter (asistente IA) =====
# La api key es por usuario (cifrada en BD); esta propiedad no se usa en produccion
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.model=${OPENROUTER_MODEL:google/gemini-2.5-pro}

# ===== OpenAPI / Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== Logs =====
logging.level.root=WARN
logging.level.com.autodeploy=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=/var/log/autodeploy/backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=200MB

# ===== Actuator (solo healthcheck; metrics y prometheus expuestos via herramienta dedicada) =====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=false

# Contacto - webhook de Discord (se inyecta por entorno; vacio = deshabilitado)
autodeploy.discord.contacto-webhook=${DISCORD_CONTACTO_WEBHOOK:}
